<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>video - 历史存档</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --container-bg: white; --text-color: #333;
            --nav-bg: white; --nav-text: #333; --border-color: rgba(0,0,0,0.1);
        }
        .dark-mode {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --container-bg: #1a1a2e; --text-color: #e0e0e0;
            --nav-bg: #1f1f38; --nav-text: #e0e0e0; --border-color: rgba(255,255,255,0.1);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-gradient); min-height: 100vh; padding: 20px; color: var(--text-color); }
        .container { max-width: 1200px; margin: 0 auto; background: var(--container-bg); border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; transition: background 0.3s; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; background: var(--nav-bg); border-bottom: 1px solid var(--border-color); }
        .navbar-brand { font-size: 1.5em; font-weight: bold; color: var(--nav-text); text-decoration: none; }
        .nav-links { display: flex; gap: 20px; list-style: none; }
        .nav-links a { color: var(--nav-text); text-decoration: none; font-weight: 500; }
        .nav-links a:hover { color: #667eea; }
        .theme-toggle { background: none; border: 2px solid var(--border-color); color: var(--nav-text); padding: 8px 16px; border-radius: 20px; cursor: pointer; }
        .theme-toggle:hover { background: #e8f4f8; color: #667eea; }
        .content { padding: 40px 30px; }
        .cover-section { position:relative; width:100%; height:500px; margin-bottom:30px; border-radius:12px; overflow:hidden; box-shadow:0 8px 16px rgba(0,0,0,0.2); }
        .cover-image { width:100%; height:100%; object-fit:cover; }
        .cover-overlay { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(to top,rgba(0,0,0,0.8),transparent); padding:40px 30px; color:white; opacity:0; transition:opacity .3s; }
        .cover-section:hover .cover-overlay { opacity:1; }
        .cover-subtitle { font-size:1.8em; opacity:0.9; text-shadow:2px 2px 4px rgba(0,0,0,0.5); }
        .mute-btn { position:absolute; top:15px; right:15px; background:rgba(0,0,0,0.5); border:none; border-radius:50%; width:40px; height:40px; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; z-index:10; }
        .mute-btn:hover { background:rgba(0,0,0,0.7); }
        footer { background: var(--nav-bg); padding: 30px; text-align: center; color: var(--text-color); font-size: 0.95em; border-top: 1px solid var(--border-color); opacity: 0.7; }
        footer a { color: #667eea; text-decoration: none; }
        footer a:hover { text-decoration: underline; }
        .footer-links { margin-top: 15px; }
        .footer-links a { margin: 0 10px; color: var(--text-color); }
        @media (max-width: 768px) { .cover-section { height: 300px; } .cover-subtitle { font-size: 1.3em; } .nav-links { display: none; } }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <a href="../../../index.html" class="navbar-brand">📺 video</a>
            <ul class="nav-links">
                <li><a href="../../../index.html">首页</a></li>
                <li><a href="../../../about.html">关于</a></li>
                <li><a href="../../../contact.html">联系</a></li>
                <li><a href="../../../history.html" style="color:#667eea;">历史</a></li>
            </ul>
            <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
        </nav>
        <div class="content">
            <div class="cover-section">
                <video src="cover.mp4" autoplay loop muted playsinline class="cover-image" id="coverVideo"></video>
                <button class="mute-btn" id="muteBtn" onclick="toggleMute()">🔇</button>
                <div class="cover-overlay">
                    <p class="cover-subtitle">🌲 森林动物世界 · 2026年5月25日</p>
                </div>
            </div>
        </div>

        <section style="padding: 40px 30px; border-top: 1px solid var(--border-color);">
            <h2 style="font-size: 1.4em; font-weight: bold; margin-bottom: 20px; color: var(--text-color);">💬 发表评论</h2>
            <div id="disqus_thread"></div>
            <script>
                var disqus_config = function () {
                    this.page.url = window.location.href;
                    this.page.identifier = window.location.pathname;
                };
                (function() {
                    var d = document, s = d.createElement('script');
                    s.src = 'https://tom-xst9ggxnjx.disqus.com/embed.js';
                    s.setAttribute('data-timestamp', +new Date());
                    (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>请启用 JavaScript 查看评论</noscript>
        </section>

        <footer>
            <p>🎬 视频存档 | <a href="../../../index.html">返回首页</a></p>
            <div class="footer-links">
                <a href="../../../index.html">首页</a>
                <a href="../../../about.html">关于</a>
                <a href="../../../contact.html">联系</a>
                <a href="../../../history.html">历史</a>
            </div>
        </footer>
    </div>
    <script>
        function toggleTheme(){document.body.classList.toggle('dark-mode');localStorage.setItem('theme',document.body.classList.contains('dark-mode')?'dark':'light');}
        const saved=localStorage.getItem('theme');if(saved==='dark')document.body.classList.add('dark-mode');
        if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches&&!saved)document.body.classList.add('dark-mode');
        function toggleMute(){const v=document.getElementById('coverVideo'),b=document.getElementById('muteBtn');v.muted=!v.muted;b.textContent=v.muted?'🔇':'🔊';}
    </script>
</body>
</html>
